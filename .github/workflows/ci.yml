name: CI - Build & Push Docker Image

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Determine image tag
        id: image-tag
        run: echo "image_tag=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (:${{ steps.image-tag.outputs.image_tag }})
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ steps.image-tag.outputs.image_tag }}
          build-args: |
            COMMIT=${{ github.sha }}
